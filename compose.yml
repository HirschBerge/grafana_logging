# Docker compose file for netprobe
# https://github.com/plaintextpackets/netprobe_lite
name: netprobe

networks:
  netprobe-net:
    
services:
  redis:
    restart: always
    container_name: netprobe-redis
    image: "redis:latest"
    volumes:
      - ./config/redis/redis.conf:/etc/redis/redis.conf
    networks:
      - netprobe-net
        
  netprobe:
    restart: always
    container_name: netprobe-probe
    image: "plaintextpackets/netprobe:latest"
    volumes:
      - .:/netprobe_lite
    environment:
      MODULE: "NETPROBE"
    networks:
      - netprobe-net

  presentation:
    restart: always
    container_name: netprobe-presentation
    image: "plaintextpackets/netprobe:latest"
    volumes:
      - .:/netprobe_lite
    environment:
      MODULE: "PRESENTATION"
    networks:
      - netprobe-net

  prometheus:
    restart: always
    container_name: netprobe-prometheus
    image: "prom/prometheus"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus  # Persistent local storage for Prometheus data
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - netprobe-net

  grafana:
    restart: always
    container_name: netprobe-grafana
    image: grafana/grafana-enterprise
    volumes:
      - ./config/grafana/datasources/automatic.yml:/etc/grafana/provisioning/datasources/automatic.yml
      - ./config/grafana/dashboards/main.yml:/etc/grafana/provisioning/dashboards/main.yml
      - ./config/grafana/dashboards/netprobe.json:/var/lib/grafana/dashboards/netprobe.json
      - ./config/grafana/dashboards/pve.json:/var/lib/grafana/dashboards/pve.json
      - ./config/grafana/dashboards/pi-hole.json:/var/lib/grafana/dashboards/pi-hole.json
      - ./config/grafana/dashboards/docker.json:/var/lib/grafana/dashboards/docker.json
        #      - ./config/grafana/dashboards/plex.json:/var/lib/grafana/dashboards/plex.json
        #      - ./config/grafana/dashboards/truenas.json:/var/lib/grafana/dashboards/truenas.json
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    networks:
      - netprobe-net

  prometheus-pve-exporter:
    restart: always
    container_name: prometheus-pve-exporter
    image: prompve/prometheus-pve-exporter
    ports:
      - "9221:9221"
    volumes:
      - ./config/prometheus/pve.yml:/etc/prometheus/pve.yml
    networks:
      - netprobe-net     

  pihole:
    image: ekofr/pihole-exporter:latest
    environment:
      - PIHOLE_HOSTNAME=10.10.0.11
      - PIHOLE_API_TOKEN=5871477110c0452f928714ef19e0d732ff9c0b6f3c7826f445f9c4039636fdb9
      - PORT=9617
    ports:
      - "9617:9617"
    networks:
      - netprobe-net

