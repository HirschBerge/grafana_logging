accessLog:
  filePath: "/access.log"
  format: json
  filters:
    statusCodes:
      - "200"
      - "300-302"
    retryAttempts: true
    minDuration: "10ms"
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
api:
  dashboard: true
  debug: true
entryPoints:
  # Internal
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  https:
    address: ":443"
  # Public
  http-public:
    address: ":81"
      #    http:
      #      redirections:
      #        entryPoint:
      #          to: https-public
      #          scheme: https
  https-public:
    address: ":444"
serversTransport:
  insecureSkipVerify: true
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    watch: true
    filename: /config.yml
  
certificatesResolvers:
  production:
    acme:
      email: hirschy.kirkwood@gmail.com
      storage: /acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

